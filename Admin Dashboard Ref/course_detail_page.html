<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Clove Learning Portal Course Builder</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4a6af7",
                        "background-light": "#f5f6f8",
                        "background-dark": "#101322",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            font-feature-settings: "liga";
            -webkit-font-smoothing: antialiased;
        }
    </style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark">
<div class="relative flex h-screen min-h-screen w-full flex-col group/design-root overflow-hidden">
<!-- Top Nav Bar -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 px-6 py-3 bg-white dark:bg-background-dark z-10 shrink-0">
<div class="flex items-center gap-4 text-slate-900 dark:text-white">
<div class="size-6 text-primary">
<svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M44 4H30.6666V17.3334H17.3334V30.6666H4V44H44V4Z" fill="currentColor"></path>
</svg>
</div>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em]">Clove Learning Portal</h2>
</div>
<div class="flex flex-1 justify-end gap-2 items-center">
<button class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-4 bg-primary text-white text-sm font-bold leading-normal tracking-[0.015em]">
<span class="truncate">Publish</span>
</button>
<button class="flex max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 bg-slate-100 dark:bg-slate-800/50 text-slate-900 dark:text-white gap-2 text-sm font-bold leading-normal tracking-[0.015em] min-w-0 px-2.5">
<span class="material-symbols-outlined text-xl">notifications</span>
</button>
<button class="flex max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 bg-slate-100 dark:bg-slate-800/50 text-slate-900 dark:text-white gap-2 text-sm font-bold leading-normal tracking-[0.015em] min-w-0 px-2.5">
<span class="material-symbols-outlined text-xl">help</span>
</button>
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full size-10" data-alt="User avatar image" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDkFgZCjVhXZv4NQdWxa6KOpnW20xXk0aaGAT52WW6ZJodYpALdEvlAXZq9wu9FO1terPs9npOv3JVW6B2mcMjZ2VQgyIcXvSKMCKu8Ssw76FqpEctEVSqMqGAsQRXDECBMdMqSNVHA9YBLBNX7WMH7qpSwZ--W8XL_mgYdIgALVbaOubdBNFqUu-MJ6-zXEbjLFBrR1iqt36NDGZLKU8eDDpUrgz-WFTb5BosYWLdni4iJEqOC50iYW5Y9jBHVM68f-L87XPvZkuo");'></div>
</div>
</header>
<div class="flex grow overflow-hidden">
<!-- Side Nav Bar -->
<aside class="flex h-full w-64 shrink-0 flex-col justify-between bg-white dark:bg-background-dark p-4 border-r border-slate-200 dark:border-slate-800">
<div class="flex flex-col gap-4">
<div class="flex gap-3 items-center">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-lg size-10" data-alt="Abstract course thumbnail" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBgy0Zir6zsEoM7kI0j-YKZh5tkVdPbtOBuDsTNyWC6RhA7q2trX6uDohq4jyCTP0LnN6kgSuJmP8uz4lK2h0iwDp9DGnLidlDpmZckitAdFXwpHghofiOn4njzgMRK086YVl1lmBk6e3U8NXhUIUzEksjl4Lc88eVrxA6fOElWk8Rb3kz8HZnjuWeLbEZwYMnwl5T2u0iM8F2VvsI5VA10DcP-v_kg8lV4ae4N-4j_E0GfLsA6lqEYNOEjRrh1nyH8ibkBj5y3cfc");'></div>
<div class="flex flex-col">
<h1 class="text-slate-900 dark:text-white text-base font-medium leading-normal">Course Builder</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal leading-normal">Admin View</p>
</div>
</div>
<div class="flex flex-col gap-2 mt-4">
<div class="flex items-center gap-3 px-3 py-2 rounded-lg bg-primary/10 text-primary">
<span class="material-symbols-outlined !fill-1 text-2xl">info</span>
<p class="text-sm font-medium leading-normal">Course Details</p>
</div>
<div class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800/50 text-slate-600 dark:text-slate-300">
<span class="material-symbols-outlined text-2xl">library_books</span>
<p class="text-sm font-medium leading-normal">Modules &amp; Lessons</p>
</div>
<div class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800/50 text-slate-600 dark:text-slate-300">
<span class="material-symbols-outlined text-2xl">quiz</span>
<p class="text-sm font-medium leading-normal">Quizzes</p>
</div>
<div class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800/50 text-slate-600 dark:text-slate-300">
<span class="material-symbols-outlined text-2xl">visibility</span>
<p class="text-sm font-medium leading-normal">Review &amp; Publish</p>
</div>
</div>
</div>
<button class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-4 bg-primary text-white text-sm font-bold leading-normal tracking-[0.015em] gap-2">
<span class="material-symbols-outlined text-xl">play_circle</span>
<span class="truncate">Preview Course</span>
</button>
</aside>
<!-- Main Content Area -->
<main class="flex-1 overflow-y-auto p-8">
<div class="max-w-4xl mx-auto">
<!-- Page Heading -->
<div class="flex flex-wrap justify-between gap-3 pb-8">
<div class="flex min-w-72 flex-col gap-2">
<p class="text-slate-900 dark:text-white text-4xl font-black leading-tight tracking-[-0.033em]">Course Details</p>
<p class="text-slate-500 dark:text-slate-400 text-base font-normal leading-normal">Enter the metadata for your new course.</p>
</div>
</div>
<!-- Course Form -->
<div class="space-y-8 bg-white dark:bg-slate-900/50 p-8 rounded-xl border border-slate-200 dark:border-slate-800">
<!-- Course Title -->
<div class="flex max-w-full flex-wrap items-end gap-4">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-900 dark:text-white text-base font-medium leading-normal pb-2">Course Title</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-primary h-14 placeholder:text-slate-400 p-[15px] text-base font-normal leading-normal" placeholder="e.g., Introduction to Digital Marketing" value="Introduction to Python Programming"/>
</label>
</div>
<!-- Course Description -->
<div class="flex max-w-full flex-wrap items-end gap-4">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-900 dark:text-white text-base font-medium leading-normal pb-2">Course Description</p>
<textarea class="form-input flex w-full min-w-0 flex-1 resize-y overflow-hidden rounded-lg text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-primary min-h-36 placeholder:text-slate-400 p-[15px] text-base font-normal leading-normal" placeholder="Provide a detailed summary of the course content and learning objectives.">Learn the fundamentals of Python, from basic syntax to advanced concepts like object-oriented programming. This course is designed for absolute beginners with no prior programming experience.</textarea>
</label>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
<!-- Instructor -->
<div class="flex max-w-full flex-wrap items-end gap-4">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-900 dark:text-white text-base font-medium leading-normal pb-2">Instructor</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-primary h-14 placeholder:text-slate-400 p-[15px] text-base font-normal leading-normal" placeholder="e.g., Jane Doe" value="Alex Morgan"/>
</label>
</div>
<!-- Category -->
<div class="flex max-w-full flex-wrap items-end gap-4">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-900 dark:text-white text-base font-medium leading-normal pb-2">Category</p>
<select class="form-select flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-primary h-14 placeholder:text-slate-400 px-[15px] text-base font-normal leading-normal">
<option>Select a category...</option>
<option selected="">Programming</option>
<option>Design</option>
<option>Marketing</option>
<option>Business</option>
</select>
</label>
</div>
</div>
<!-- Thumbnail Uploader -->
<div>
<p class="text-slate-900 dark:text-white text-base font-medium leading-normal pb-2">Course Thumbnail</p>
<div class="flex items-center gap-6">
<div class="bg-center bg-no-repeat aspect-video bg-cover rounded-lg w-48 h-28" data-alt="Python course thumbnail" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCwlUXxi-4KeiTD6cmri5Dqw4UDEd0KqDCC9n-mqSh5TVGLSYqokTAT9bpyekUDAKwEkPLyDe_R9R2kXVVHPxVWym2F7xDGRLibuuqGItRq-MEJz6asXRt1WN0P-8ClksquRd6BSjsONOrVDlzTcjWeX2siUbul6XvAWCYBCzSE1wqo8zAHni4zMtK6ClW-UNtg3N05ExOOqTPMcoT7Zx-OPRtKtaWTDa9ZhsVSvvRlOMslpy-XFj2806M9ARofUGTPd3_diGAjNSc");'></div>
<div class="flex-1">
<div class="flex items-center justify-center w-full">
<label class="flex flex-col items-center justify-center w-full h-28 border-2 border-slate-300 dark:border-slate-700 border-dashed rounded-lg cursor-pointer bg-slate-50 dark:bg-slate-800/50 hover:bg-slate-100 dark:hover:bg-slate-800" for="dropzone-file">
<div class="flex flex-col items-center justify-center pt-5 pb-6">
<span class="material-symbols-outlined text-4xl text-slate-400 dark:text-slate-500">cloud_upload</span>
<p class="mb-2 text-sm text-slate-500 dark:text-slate-400"><span class="font-semibold">Click to upload</span> or drag and drop</p>
<p class="text-xs text-slate-500 dark:text-slate-400">SVG, PNG, JPG or GIF (MAX. 800x400px)</p>
</div>
<input class="hidden" id="dropzone-file" type="file"/>
</label>
</div>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="flex justify-end gap-3 pt-4">
<button class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-4 bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-white text-sm font-bold leading-normal">
<span class="truncate">Cancel</span>
</button>
<button class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-4 bg-primary text-white text-sm font-bold leading-normal tracking-[0.015em] gap-2">
<span class="truncate">Save &amp; Next</span>
<span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</div>
</div>
</div>
</main>
</div>
</div>
</body></html>
