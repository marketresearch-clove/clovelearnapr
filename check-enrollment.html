<!-- Quick Course Enrollment Checker -->
<!DOCTYPE html>
<html>

<head>
    <title>Course Enrollment Checker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transaction: background 0.3s;
        }

        button:hover {
            opacity: 0.9;
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            border-radius: 5px;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result.success {
            background: #f0fff4;
            border-left-color: #48bb78;
        }

        .result.error {
            background: #fff5f5;
            border-left-color: #f56565;
        }

        .stat {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .stat-label {
            font-weight: bold;
            color: #555;
        }

        .stat-value {
            color: #667eea;
            font-size: 18px;
            font-weight: bold;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-style: italic;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🎓 Course Enrollment Checker</h1>

        <div class="form-group">
            <label for="courseTitle">Course Title (partial match OK):</label>
            <input type="text" id="courseTitle" placeholder="e.g., Introduction to Risk Management"
                value="Introduction to Risk Management">
        </div>

        <button onclick="checkEnrollment()">Check Enrollment</button>

        <div class="result" id="result"></div>
    </div>

    <script>
        // Using Supabase client from CDN
        const SUPABASE_URL = 'https://pbqnxdvxlbvqoxvngjwt.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBicW54ZHZ4bGJ2cW94dm5nand0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDQ3MDI4OTksImV4cCI6MjAyMDI3ODg5OX0.LMJ1PSIH9Lp1fIlRHmLNL5wKCkEfaB0UU-xCg2VVp5w';

        async function checkEnrollment() {
            const courseTitle = document.getElementById('courseTitle').value.trim();

            if (!courseTitle) {
                showResult('Please enter a course title', 'error');
                return;
            }

            const resultEl = document.getElementById('result');
            resultEl.innerHTML = '<div class="loading">🔍 Searching for course...</div>';
            resultEl.classList.add('show');

            try {
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/courses?select=id,title,totalstudents,status,is_hidden&title=ilike.%${encodeURIComponent(courseTitle)}%`,
                    {
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Content-Type': 'application/json',
                        }
                    }
                );

                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }

                const courses = await response.json();

                if (courses.length === 0) {
                    showResult(`No courses found matching "${courseTitle}"`, 'error');
                    return;
                }

                let html = '<h2 style="color: #667eea; margin-top: 0;">✅ Course Found!</h2>';

                for (const course of courses) {
                    html += `
                        <div style="margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #ddd;">
                            <h3 style="color: #333; margin-top: 0;">${course.title}</h3>
                            <div class="stat">
                                <span class="stat-label">Course ID:</span>
                                <span>${course.id}</span>
                            </div>
                            <div class="stat">
                                <span class="stat-label">📊 Total Enrolled Learners:</span>
                                <span class="stat-value">${course.totalstudents || 0}</span>
                            </div>
                            <div class="stat">
                                <span class="stat-label">Status:</span>
                                <span>${course.status}</span>
                            </div>
                            <div class="stat">
                                <span class="stat-label">Visibility:</span>
                                <span>${course.is_hidden ? '🔒 Private/Hidden' : '🔓 Public'}</span>
                            </div>
                        </div>
                    `;
                }

                resultEl.innerHTML = html;
                resultEl.classList.remove('error');
                resultEl.classList.add('success');

            } catch (error) {
                console.error('Error:', error);
                showResult(`Error fetching course data: ${error.message}`, 'error');
            }
        }

        function showResult(message, type) {
            const resultEl = document.getElementById('result');
            resultEl.innerHTML = `<div style="color: ${type === 'error' ? '#e53e3e' : '#22543d'};">${message}</div>`;
            resultEl.classList.add('show');
            resultEl.classList.remove(type === 'error' ? 'success' : 'error');
            resultEl.classList.add(type);
        }

        // Allow Enter key to trigger search
        document.getElementById('courseTitle').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkEnrollment();
        });

        // Auto-check on page load
        window.addEventListener('load', () => {
            setTimeout(checkEnrollment, 500);
        });
    </script>
</body>

</html>
