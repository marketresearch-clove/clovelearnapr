<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Certificate of Completion</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&amp;family=Dancing+Script:wght@700&amp;family=Inter:wght@300;400;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#0F3D47", // Dark Teal from the sidebar
              accent: "#E29562", // Orange from the design
              "accent-light": "#F2D597", // Light yellow/beige
              "background-light": "#F3F1E7", // Off-white paper color
              "background-dark": "#1a202c", // Dark mode background
              "text-dark": "#0F3D47", // Dark text color
            },
            fontFamily: {
              display: ["Space Grotesk", "sans-serif"],
              body: ["Inter", "sans-serif"],
              signature: ["Dancing Script", "cursive"],
            },
            borderRadius: {
              DEFAULT: "0.5rem",
              xl: "1rem",
              '2xl': "2rem",
            },
            backgroundImage: {
                'radial-circles': 'radial-gradient(circle at 70% 30%, transparent 0%, transparent 10%, rgba(15, 61, 71, 0.03) 10.1%, rgba(15, 61, 71, 0.03) 10.5%, transparent 10.6%, transparent 20%, rgba(15, 61, 71, 0.03) 20.1%, rgba(15, 61, 71, 0.03) 20.5%, transparent 20.6%, transparent 30%, rgba(15, 61, 71, 0.03) 30.1%, rgba(15, 61, 71, 0.03) 30.5%, transparent 30.6%, transparent 40%, rgba(15, 61, 71, 0.03) 40.1%, rgba(15, 61, 71, 0.03) 40.5%, transparent 40.6%)',
            }
          },
        },
      };
    </script>
<style>
        .geometric-pattern {
            background-image: 
                linear-gradient(45deg, #0F3D47 25%, transparent 25%), 
                linear-gradient(-45deg, #0F3D47 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #0F3D47 75%), 
                linear-gradient(-45deg, transparent 75%, #0F3D47 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }.scalloped-circle {
            clip-path: polygon(50% 0%, 57% 5%, 65% 3%, 71% 9%, 79% 9%, 84% 16%, 91% 18%, 94% 26%, 99% 30%, 99% 39%, 100% 48%, 99% 57%, 98% 65%, 93% 72%, 90% 80%, 83% 85%, 78% 92%, 69% 94%, 63% 99%, 54% 97%, 46% 97%, 37% 99%, 31% 94%, 22% 92%, 17% 85%, 10% 80%, 7% 72%, 2% 65%, 1% 57%, 0% 48%, 1% 39%, 1% 30%, 6% 26%, 9% 18%, 16% 16%, 21% 9%, 29% 9%, 35% 3%, 43% 5%);
        }
        /* A4 Landscape Styling for Display */
        html, body {
            margin: 0;
            padding: 0;
            background: #f3f4f6;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }
        .certificate-container {
            width: 1189px;
            height: 842px;
            max-width: 100%;
            background: white;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 0.5rem;
        }
        .certificate-header {
            padding: 1.5rem;
            border-bottom: 1px solid #e5e7eb;
            flex-shrink: 0;
        }
        .certificate-content-wrapper {
            display: flex;
            flex-direction: row;
            flex-grow: 1;
            overflow: hidden;
        }
        .certificate-sidebar {
            width: 280px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }
        .certificate-main {
            flex: 1;
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-y: auto;
        }
    </style>
</head>
<body class="font-body">
<div class="certificate-container">
<div class="certificate-header flex items-center">
<div class="text-left" style="margin-left: 20px;">
<h1 class="text-2xl font-bold text-primary font-display tracking-widest">CLOVE</h1>
<p class="text-sm text-gray-600 uppercase tracking-wider font-light">TECHNOLOGIES</p>
</div>
</div>
<div class="certificate-content-wrapper">
<div class="certificate-sidebar relative">
<div class="h-64 bg-background-light grid grid-cols-4 grid-rows-4">
<div class="bg-background-light"></div>
<div class="bg-primary"></div>
<div class="bg-background-light rounded-bl-full"></div>
<div class="bg-accent"></div>
<div class="bg-primary rounded-br-full"></div>
<div class="bg-accent-light rounded-tr-full"></div>
<div class="bg-primary"></div>
<div class="bg-background-light relative flex justify-center items-center">
<div class="w-6 h-6 rounded-full bg-background-light absolute top-2 right-2"></div>
</div>
<div class="bg-background-light flex justify-center items-center">
<div class="w-8 h-8 bg-background-light"></div>
</div>
<div class="bg-accent rounded-tl-full"></div>
<div class="bg-background-light"></div>
<div class="bg-accent col-span-1"></div>
<div class="bg-accent rounded-tr-full"></div>
<div class="bg-accent-light rounded-full"></div>
<div class="bg-background-light"></div>
<div class="bg-primary relative overflow-hidden">
<div class="absolute bottom-0 right-0 w-full h-full bg-accent -rotate-45 transform origin-bottom-right"></div>
</div>
</div>
<div class="flex-grow bg-primary flex items-center justify-center relative p-8">
<div class="transform -rotate-90 origin-center whitespace-nowrap absolute">
<h1 class="text-white text-5xl font-bold font-display tracking-widest leading-tight">
<span class="block text-right">Clove Learning</span>
<span class="block text-right text-3xl opacity-80 mt-2">Portal</span>
</h1>
<p class="text-white mt-4 text-sm uppercase tracking-[0.2em] font-light text-right opacity-70">
                        Skills &amp; Professional Training
                     </p>
</div>
</div>
</div>
<div class="certificate-main relative bg-radial-circles">
<div class="absolute bottom-0 right-0 w-48 h-48 grid grid-cols-2 grid-rows-2 z-0 opacity-80">
<div class="bg-transparent"></div>
<div class="bg-accent rounded-tl-[4rem]"></div>
<div class="bg-primary"></div>
<div class="bg-accent-light rounded-br-lg"></div>
</div>
<div class="absolute bottom-0 right-32 w-16 h-16 bg-accent-light" style="clip-path: polygon(50% 0%, 0% 100%, 100% 100%);"></div>
<div class="absolute top-16 right-16 z-10">
<div class="w-32 h-32 bg-accent rounded-full flex items-center justify-center scalloped-circle shadow-lg relative border-4 border-white">
<div class="w-28 h-28 border-2 border-white/30 rounded-full flex items-center justify-center scalloped-circle">
<span class="material-icons text-white text-6xl drop-shadow-md">star</span>
</div>
</div>
</div>
<div class="relative z-10 flex flex-col h-full justify-between">
<h2 class="text-6xl font-bold text-primary font-display leading-tight mb-4">
                    Certificate
                    <br/>
<span class="text-primary">Of Completion</span>
</h2>
<div class="text-sm text-gray-600 font-mono mb-8">
    Certificate ID: {certificateId}
</div>
<div class="w-24 h-1 bg-gray-300 my-8"></div>
<p class="text-xl text-gray-600 font-medium mb-4">is awarded to</p>
<div class="mb-8">
<h3 class="text-5xl font-bold text-accent font-display">{userName}</h3>
</div>
<div class="mb-8 max-w-lg">
<p class="text-lg text-gray-700 leading-relaxed">
                        For Completion of the <br/>
<strong class="text-primary font-bold text-xl block mt-1">{courseTitle}</strong>
</p>
</div>
<div class="mb-8">
<p class="text-lg text-gray-700">
                        Grade: <span class="font-bold text-primary">Qualified</span>
</p>
</div>
<div class="inline-block bg-accent text-white px-8 py-3 rounded-lg shadow-md mb-8">
<p class="font-medium text-lg">Date of Issue: {issueDate}</p>
</div>

<!-- DYNAMIC_SIGNATURES_START -->
<!-- DYNAMIC_SIGNATURES_END -->

</div>
</div>
</div>
</div>
</div>

</body></html>
